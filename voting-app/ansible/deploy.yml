- name: Deploy voting app
  hosts: local
  become: yes

  tasks:

    - name: Install docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Install docker compose
      apt:
        name: docker-compose
        state: present

    - name: Clone project repo
      git:
        repo: https://github.com/ayeAlvo/DevOps90Days.git
        dest: /opt/devops90days
        update: yes

    - name: Start voting app
      command: docker compose up -d
      args:
        chdir: /opt/devops90days/voting-app

    - name: Show running containers
      command: docker ps